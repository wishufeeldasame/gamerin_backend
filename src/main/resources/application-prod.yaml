server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            scope:
              - profile
              - email

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true

app:
  media:
    upload-dir: ${APP_MEDIA_UPLOAD_DIR:/app/uploads}
    video:
      optimization:
        enabled: ${APP_MEDIA_VIDEO_OPTIMIZATION_ENABLED:true}
        ffmpeg-path: ${APP_MEDIA_VIDEO_OPTIMIZATION_FFMPEG_PATH:ffmpeg}
  post:
    cleanup:
      hard-delete-after: ${POST_CLEANUP_HARD_DELETE_AFTER:24h}
      initial-delay-ms: ${POST_CLEANUP_INITIAL_DELAY_MS:60000}
      fixed-delay-ms: ${POST_CLEANUP_FIXED_DELAY_MS:3600000}
  mail:
    from-address: ${APP_MAIL_FROM_ADDRESS:no-reply@gamerin.local}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  frontend:
    base-url: ${FRONTEND_BASE_URL}
    password-reset-path: ${FRONTEND_PASSWORD_RESET_PATH:/auth/reset-password}
  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
      refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
      refresh-cookie-name: ${REFRESH_COOKIE_NAME:refresh_token}
      refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
      refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
    password-reset:
      expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:30}

pubg:
  api:
    key: ${PUBG_API_KEY:}

openai:
  api:
    key: ${OPENAI_API_KEY:}
  moderation:
    enabled: ${OPENAI_MODERATION_ENABLED:true}
    model: ${OPENAI_MODERATION_MODEL:omni-moderation-latest}
    ffmpeg-path: ${OPENAI_MODERATION_FFMPEG_PATH:ffmpeg}
