spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gamerin_local
    username: postgres
    password: your-password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create  # # create or update 는 개발용 운영에서는 validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 여기에_구글_클라이언트_ID
            client-secret: 여기에_구글_클라이언트_시크릿
            scope:
              - profile
              - email
    user:
      name: user
      password: your-password

  mail:
    host: smtp.example.com
    port: 587
    username: your-smtp-username  # ${mail.username}
    password: your-smtp-password  # ${mail.password}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true

app:
  mail:
    from-address: no-reply@example.com
  cors:
    allowed-origins:
      - http://localhost:3000
  frontend:
    base-url: http://localhost:3000
    password-reset-path: /auth/reset-password
  auth:
    jwt:
      secret: "여기에_충분히_긴_랜덤_문자열_또는_base64_secret"
      access-token-expiration-seconds: 1800
      refresh-token-expiration-seconds: 1209600
      refresh-cookie-name: refresh_token
    password-reset:
      expiration-minutes: 30

pubg:
  api:
    key: "여기에_PUBG_API_KEY"

openai:
  api:
    key: ${OPENAI_API_KEY:}
  moderation:
    enabled: true
    model: omni-moderation-latest
    ffmpeg-path: mac: /opt/homebrew/bin/ffmpe linux: /usr/bin/ffmpeg
