spring:
  application:
    name: backend

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:3000
  media:
    upload-dir: uploads
  frontend:
    base-url: http://localhost:3000
    password-reset-path: /auth/reset-password
  mail:
    from-address: no-reply@gamerin.local
  auth:
    password-reset:
      expiration-minutes: 30
