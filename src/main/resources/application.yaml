spring:
  application:
    name: backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 520MB

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:3000
  media:
    upload-dir: uploads
    video:
      optimization:
        enabled: true
        ffmpeg-path: ffmpeg
  post:
    cleanup:
      hard-delete-after: 24h
      initial-delay-ms: 60000
      fixed-delay-ms: 3600000
  frontend:
    base-url: http://localhost:3000
    password-reset-path: /auth/reset-password
  mail:
    from-address: no-reply@gamerin.local
  auth:
    password-reset:
      expiration-minutes: 30

openai:
  api:
    key: ${OPENAI_API_KEY:}
  moderation:
    enabled: true
    model: omni-moderation-latest
    ffmpeg-path: ffmpeg
